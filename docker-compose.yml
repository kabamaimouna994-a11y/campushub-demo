version: "3.9"

services:
  # ─── Base de données PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: campushub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campushub}
      POSTGRES_USER: ${POSTGRES_USER:-campushub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campushub_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campushub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend FastAPI ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campushub_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-campushub}:${POSTGRES_PASSWORD:-campushub_secret}@postgres:5432/${POSTGRES_DB:-campushub}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    volumes:
      - ./backend/static:/app/static
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend React (Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campushub_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}

volumes:
  postgres_data:
